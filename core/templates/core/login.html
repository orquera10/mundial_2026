{% extends 'core/base.html' %}

{% block title %}Ingresar | Mundial 2026{% endblock %}

{% block content %}
<section class="panel">
    <div class="panel-logo logo-large">
        {% include 'core/partials/logo_mundial.html' %}
    </div>
    <h1><span class="label-with-icon"><span class="icon" aria-hidden="true">→</span>Ingresar</span></h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_div }}
        <button class="with-icon" type="submit"><span class="icon light" aria-hidden="true">→</span>Entrar</button>
    </form>
    <p>No tenes cuenta? <a href="{% url 'core:registro' %}">Registrate</a>.</p>
</section>
{% endblock %}
